{% extends "admin_base.html" %}
{% block title %}Create User – {{ pharmacy_name }}{% endblock %}
{% block admin_content %}

<div class="top-bar">
    <h4 class="fw-bold mb-0" style="color: var(--deep-blue);"><i class="fas fa-user-plus me-2"></i>Create New User</h4>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm rounded-4 p-4">
            {% if error %}
            <div class="alert alert-danger rounded-pill">{{ error }}</div>
            {% endif %}
            <form method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">Full Name</label>
                    <input type="text" name="full_name" class="form-control" placeholder="Jane Doe" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Email</label>
                    <input type="email" name="email" class="form-control" placeholder="newadmin@dawalink.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-semibold">Password</label>
                    <input type="password" name="password" id="newUserPassword" class="form-control" placeholder="At least 6 characters" required>
                    <button type="button" class="btn btn-sm btn-outline-secondary mt-1 toggle-password" data-target="newUserPassword"><i class="far fa-eye"></i> Show</button>
                </div>
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" name="is_admin" id="isAdmin">
                    <label class="form-check-label fw-semibold" for="isAdmin">Grant Admin Privileges</label>
                </div>
                <button type="submit" class="btn btn-primary w-100 rounded-pill">Create User</button>
            </form>
        </div>
    </div>
</div>

<script>
    document.querySelectorAll('.toggle-password').forEach(btn => {
        btn.addEventListener('click', function() {
            const input = document.getElementById(this.dataset.target);
            const icon = this.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                this.innerHTML = '<i class="far fa-eye-slash"></i> Hide';
            } else {
                input.type = 'password';
                this.innerHTML = '<i class="far fa-eye"></i> Show';
            }
        });
    });
</script>

{% endblock %}
