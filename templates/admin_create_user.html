{% extends "admin_base.html" %}
{% block title %}Add Customer Care Agent{% endblock %}
{% block page_title %}Add Customer Care Agent{% endblock %}
{% block admin_content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm rounded-4 p-4">
            {% if error %}<div class="alert alert-danger rounded-pill">{{ error }}</div>{% endif %}
            <form method="post">
                <div class="mb-3"><input class="form-control" name="full_name" placeholder="Full Name" required></div>
                <div class="mb-3"><input class="form-control" name="email" placeholder="Email" required></div>
                <div class="mb-3"><input class="form-control" type="password" name="password" placeholder="Password" required></div>
                <div class="form-check mb-3">
                    <input class="form-check-input" type="checkbox" name="is_admin" id="isAdmin">
                    <label class="form-check-label" for="isAdmin">Grant Admin Privileges</label>
                </div>
                <button type="submit" class="btn btn-primary w-100 rounded-pill">Create Agent</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
