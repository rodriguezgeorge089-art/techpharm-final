<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login – {{ pharmacy_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0A3D62 0%, #1B5A82 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            position: relative;
        }
        .login-container {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 90%;
            padding: 3rem 2rem;
            text-align: center;
            animation: fadeInUp 0.6s ease;
        }
        .brand-icon {
            background: #F4A261;
            color: white;
            border-radius: 20px;
            padding: 15px;
            font-size: 2.5rem;
            display: inline-block;
            margin-bottom: 1rem;
        }
        h2 {
            color: #0A3D62;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }
        p.text-muted {
            margin-bottom: 2rem;
        }
        .form-control {
            border-radius: 15px;
            padding: 0.8rem 1.2rem;
            border: 1px solid #dee2e6;
            margin-bottom: 1rem;
            transition: 0.3s;
        }
        .form-control:focus {
            border-color: #F4A261;
            box-shadow: 0 0 0 0.2rem rgba(244,162,97,0.25);
        }
        .btn-login {
            background: #0A3D62;
            border: none;
            border-radius: 40px;
            padding: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: white;
            width: 100%;
            box-shadow: 0 10px 20px rgba(10, 61, 98, 0.3);
            transition: all 0.3s;
        }
        .btn-login:hover {
            background: #F4A261;
            box-shadow: 0 15px 30px rgba(244,162,97,0.4);
            transform: translateY(-2px);
        }
        .footer-links a {
            color: #0A3D62;
            text-decoration: none;
            font-weight: 600;
        }
        .floating-pill {
            position: absolute;
            opacity: 0.1;
            color: white;
            font-size: 5rem;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <!-- Decorative floating icons -->
    <i class="fas fa-pills floating-pill" style="top:10%; left:10%;"></i>
    <i class="fas fa-capsules floating-pill" style="bottom:15%; right:15%;"></i>
    <i class="fas fa-prescription-bottle floating-pill" style="top:20%; right:20%;"></i>

    <div class="login-container">
        <div class="brand-icon"><i class="fas fa-pills"></i></div>
        <h2>{{ pharmacy_name }}</h2>
        <p class="text-muted">Admin & Customer Login</p>
        <form method="post" action="/login">
            <div class="input-group mb-3">
                <span class="input-group-text bg-light border-0 rounded-start-3"><i class="fas fa-envelope text-muted"></i></span>
                <input type="email" name="email" class="form-control" placeholder="Email address" required>
            </div>
            <div class="input-group mb-3">
                <span class="input-group-text bg-light border-0 rounded-start-3"><i class="fas fa-lock text-muted"></i></span>
                <input type="password" name="password" class="form-control" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-login">Sign In</button>
        </form>
        <div class="footer-links mt-3">
            <a href="/register">Create an account</a> · <a href="/">Back to Home</a>
        </div>
        {% if error %}
        <div class="alert alert-danger mt-3">{{ error }}</div>
        {% endif %}
    </div>
</body>
</html>
