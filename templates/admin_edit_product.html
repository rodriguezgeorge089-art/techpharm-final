<!DOCTYPE html>
<html>
<head><title>Edit Product</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<nav class="navbar navbar-dark bg-primary"><div class="container"><a class="navbar-brand" href="/admin">Admin</a></div></nav>
<div class="container mt-4" style="max-width:500px;">
    <h2>Edit Product</h2>
    <form method="post" enctype="multipart/form-data">
        <input class="form-control mb-2" name="name" value="{{ product.name }}" required>
        <textarea class="form-control mb-2" name="description" rows="3">{{ product.description }}</textarea>
        <input class="form-control mb-2" name="category" value="{{ product.category }}" required>
        <input class="form-control mb-2" type="number" step="0.01" name="price" value="{{ product.price }}" required>
        <input class="form-control mb-2" type="number" name="stock" value="{{ product.stock }}" required>
        <label class="form-label">Replace Image</label>
        <input type="file" class="form-control mb-2" name="image" accept="image/*">
        <button class="btn btn-primary w-100">Update Product</button>
    </form>
</div>
</body>
</html>
