{% extends "admin_base.html" %}
{% block title %}Edit Product – {{ product.name }}{% endblock %}
{% block page_title %}Edit Product{% endblock %}
{% block topbar_right %}<a href="/admin/products" class="btn btn-outline-secondary rounded-pill"><i class="fas fa-arrow-left me-2"></i> Back to Products</a>{% endblock %}
{% block admin_content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm rounded-4 p-4">
            <form method="post" enctype="multipart/form-data">
                <div class="mb-3"><label class="form-label fw-semibold">Product Name</label><input type="text" name="name" class="form-control" value="{{ product.name }}" required></div>
                <div class="mb-3"><label class="form-label fw-semibold">Description</label><textarea name="description" class="form-control" rows="3">{{ product.description or '' }}</textarea></div>
                <div class="mb-3"><label class="form-label fw-semibold">Category</label><input type="text" name="category" class="form-control" value="{{ product.category }}" required></div>
                <div class="row">
                    <div class="col-md-6 mb-3"><label class="form-label fw-semibold">Price (KSh)</label><input type="number" step="0.01" name="price" class="form-control" value="{{ product.price }}" required></div>
                    <div class="col-md-6 mb-3"><label class="form-label fw-semibold">Stock</label><input type="number" name="stock" class="form-control" value="{{ product.stock }}" required></div>
                </div>
                <div class="mb-3"><label class="form-label fw-semibold">Replace Image</label><input type="file" name="image" class="form-control" accept="image/*">{% if product.image_url %}<small class="text-muted">Current image: <a href="{{ product.image_url }}" target="_blank">view</a></small>{% endif %}</div>
                <button type="submit" class="btn btn-primary w-100 rounded-pill">Update Product</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
