{% extends "admin_base.html" %}
{% block title %}Edit Product{% endblock %}
{% block page_title %}Edit Product{% endblock %}
{% block admin_content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm rounded-4 p-4">
            <form method="post" enctype="multipart/form-data">
                <div class="mb-3"><input class="form-control" name="name" value="{{ product.name }}" required></div>
                <div class="mb-3"><textarea class="form-control" name="description">{{ product.description or '' }}</textarea></div>
                <div class="mb-3"><input class="form-control" name="category" value="{{ product.category }}" required></div>
                <div class="row mb-3">
                    <div class="col"><input class="form-control" type="number" step="0.01" name="price" value="{{ product.price }}" required></div>
                    <div class="col"><input class="form-control" type="number" name="stock" value="{{ product.stock }}" required></div>
                </div>
                <div class="mb-3"><input class="form-control" type="file" name="image" accept="image/*"></div>
                <button type="submit" class="btn btn-primary w-100 rounded-pill">Update Product</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
