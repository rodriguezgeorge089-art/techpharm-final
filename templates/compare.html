<!DOCTYPE html>
<html>
<body>
    <h1>Compare Products</h1>
    {% if products %}
        <table border="1">
            <tr><th>Name</th><th>Price</th><th>Description</th></tr>
            {% for p in products %}
            <tr>
                <td>{{ p.name }}</td>
                <td>OKES {{ p.price }}</td>
                <td>{{ p.description }}</td>
            </tr>
            {% endfor %}
        </table>
    {% else %}
        <p>No products to compare.</p>
    {% endif %}
</body>
</html>
