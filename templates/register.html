<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – {{ pharmacy_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0A3D62 0%, #1B5A82 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
        }
        .register-container {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            max-width: 500px;
            width: 90%;
            padding: 3rem 2rem;
            text-align: center;
        }
        .brand-icon {
            background: #F4A261;
            color: white;
            border-radius: 20px;
            padding: 15px;
            font-size: 2.5rem;
            display: inline-block;
            margin-bottom: 1rem;
        }
        h2 {
            color: #0A3D62;
            font-weight: 800;
            margin-bottom: 0.5rem;
        }
        .input-group-text {
            background: #f8f9fa;
            border: none;
        }
        .form-control {
            border-left: none;
            border-radius: 0 15px 15px 0;
            padding: 0.8rem 1.2rem;
        }
        .form-control:focus {
            box-shadow: none;
            border-color: #F4A261;
        }
        .btn-register {
            background: #0A3D62;
            border: none;
            border-radius: 40px;
            padding: 0.8rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: white;
            width: 100%;
            box-shadow: 0 10px 20px rgba(10, 61, 98, 0.3);
            transition: all 0.3s;
        }
        .btn-register:hover {
            background: #F4A261;
            box-shadow: 0 15px 30px rgba(244,162,97,0.4);
            transform: translateY(-2px);
        }
        .toggle-password {
            background: white;
            border: 1px solid #dee2e6;
            border-left: none;
            border-radius: 0 40px 40px 0;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="brand-icon"><i class="fas fa-pills"></i></div>
        <h2>Create Account</h2>
        <p class="text-muted">Join {{ pharmacy_name }} today</p>
        {% if error %}
        <div class="alert alert-danger rounded-pill">{{ error }}</div>
        {% endif %}
        <form method="post">
            <div class="input-group mb-3">
                <span class="input-group-text rounded-start-pill"><i class="fas fa-user text-muted"></i></span>
                <input type="text" name="full_name" class="form-control" placeholder="Full Name" required>
            </div>
            <div class="input-group mb-3">
                <span class="input-group-text rounded-start-pill"><i class="fas fa-envelope text-muted"></i></span>
                <input type="email" name="email" class="form-control" placeholder="Email address" required>
            </div>
            <div class="input-group mb-3">
                <span class="input-group-text rounded-start-pill"><i class="fas fa-lock text-muted"></i></span>
                <input type="password" name="password" id="registerPassword" class="form-control" placeholder="Password" required>
                <button class="btn btn-outline-secondary toggle-password" type="button" data-target="registerPassword">
                    <i class="far fa-eye"></i>
                </button>
            </div>
            <button type="submit" class="btn btn-register">Create Account</button>
        </form>
        <div class="mt-3">
            <a href="/login" style="color: #0A3D62; font-weight: 600; text-decoration: none;">Already have an account? Sign In</a>
        </div>
    </div>

    <script>
        document.querySelectorAll('.toggle-password').forEach(btn => {
            btn.addEventListener('click', function() {
                const input = document.getElementById(this.dataset.target);
                const icon = this.querySelector('i');
                if (input.type === 'password') {
                    input.type = 'text';
                    icon.classList.replace('fa-eye', 'fa-eye-slash');
                } else {
                    input.type = 'password';
                    icon.classList.replace('fa-eye-slash', 'fa-eye');
                }
            });
        });
    </script>
</body>
</html>
