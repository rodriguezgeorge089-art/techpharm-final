{% extends "base.html" %}
{% block content %}
<h1>Checkout</h1>
<form action="/checkout" method="POST">
    {% if not user %}
        <input name="guest_email" placeholder="Your Email" required><br>
    {% endif %}
    <input name="shipping_name" placeholder="Full Name" required><br>
    <input name="shipping_address" placeholder="Address" required><br>
    <input name="shipping_city" placeholder="City" required><br>
    <input name="shipping_phone" placeholder="Phone Number" required><br>
    <select name="payment_method">
        <option value="cod">Cash on Delivery</option>
        <option value="mpesa">M-Pesa</option>
        <option value="card">Card</option>
    </select><br>
    <button>Place Order</button>
</form>
{% endblock %}
