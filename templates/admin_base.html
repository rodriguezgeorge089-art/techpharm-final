<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin – {{ pharmacy_name }}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --deep-blue: #0A3D62;
            --gold: #F4A261;
            --gold-light: #F7CDA2;
            --sidebar-bg: #0A3D62;
            --sidebar-hover: #0F4C7A;
            --sidebar-active: #F4A261;
            --cream: #F9F6F1;
            --text: #1E293B;
            --card-bg: #ffffff;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: #F1F5F9;
            margin: 0;
            color: var(--text);
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #0A3D62 0%, #0F4C7A 100%);
            color: white;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; bottom: 0; left: 0;
            z-index: 100;
            box-shadow: 4px 0 20px rgba(0,0,0,0.15);
            transition: all 0.3s;
        }
        .sidebar .brand {
            padding: 2rem 1.5rem;
            font-weight: 800;
            font-size: 1.8rem;
            letter-spacing: -0.5px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar .brand i {
            background: var(--gold);
            color: white;
            border-radius: 12px;
            padding: 8px 12px;
            margin-right: 10px;
        }
        .sidebar nav {
            flex: 1;
            padding: 1.5rem 0;
        }
        .sidebar nav a {
            display: flex;
            align-items: center;
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            padding: 0.9rem 1.5rem;
            margin: 0.2rem 1rem;
            border-radius: 12px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .sidebar nav a i {
            width: 24px;
            text-align: center;
            margin-right: 12px;
            font-size: 1.1rem;
        }
        .sidebar nav a:hover {
            background: var(--sidebar-hover);
            color: white;
        }
        .sidebar nav a.active {
            background: var(--gold);
            color: #0A3D62;
            font-weight: 700;
        }
        .sidebar .user-section {
            padding: 1.5rem;
            border-top: 1px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            background: var(--gold);
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; color: #0A3D62;
        }
        .main-content {
            margin-left: 260px;
            flex: 1;
            padding: 2rem;
            min-height: 100vh;
        }
        .top-bar {
            background: white;
            border-radius: 16px;
            padding: 1rem 1.5rem;
            box-shadow: var(--shadow);
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        .card-hover {
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card-hover:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 35px rgba(10,61,98,0.15);
        }
        @media (max-width: 768px) {
            .sidebar { width: 80px; }
            .sidebar .brand span, .sidebar nav a span, .user-section span { display: none; }
            .sidebar nav a i { margin-right: 0; }
            .main-content { margin-left: 80px; }
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="brand"><i class="fas fa-pills"></i> <span>DawaLink</span></div>
        <nav>
            <a href="/admin"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a>
            <a href="/admin/orders"><i class="fas fa-shopping-cart"></i> <span>Orders</span></a>
            <a href="/admin/products"><i class="fas fa-pills"></i> <span>Products</span></a>
            <a href="/admin/prescriptions"><i class="fas fa-file-prescription"></i> <span>Prescriptions</span></a>
            <a href="/admin/customers"><i class="fas fa-users"></i> <span>Customers</span></a>
            <a href="/admin/users"><i class="fas fa-headset"></i> <span>Customer Care</span></a>
            <a href="/admin/create-user"><i class="fas fa-user-plus"></i> <span>Add Agent</span></a>
            <a href="/admin/settings"><i class="fas fa-cog"></i> <span>Settings</span></a>
            <a href="/admin/export-orders"><i class="fas fa-download"></i> <span>Export CSV</span></a>
        </nav>
        <div class="user-section">
            <div class="avatar">A</div>
            <span style="color:white; font-weight:600;">{{ session.user_name or 'Admin' }}</span>
            <a href="/logout" class="ms-auto btn btn-sm btn-outline-light rounded-pill"><i class="fas fa-sign-out-alt"></i></a>
        </div>
    </aside>
    <div class="main-content">
        {% block admin_content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
