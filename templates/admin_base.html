<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin – {{ pharmacy_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { display: flex; margin: 0; font-family: 'Segoe UI', sans-serif; }
        .sidebar {
            width: 260px; background: #0A3D62; color: white;
            padding: 1rem; min-height: 100vh; position: fixed; top: 0; left: 0;
        }
        .sidebar a { color: #cbd5e1; text-decoration: none; display: block; padding: 0.5rem; border-radius: 8px; }
        .sidebar a:hover { background: #0F4C7A; }
        .main-content { margin-left: 260px; padding: 2rem; flex: 1; background: #f4f6f9; min-height: 100vh; }
    </style>
</head>
<body>
    <div class="sidebar">
        <h4 class="text-warning"><i class="fas fa-pills"></i> {{ pharmacy_name }}</h4>
        <hr>
        <a href="/admin">Dashboard</a>
        <a href="/admin/orders">Orders</a>
        <a href="/admin/products">Products</a>
        <a href="/admin/prescriptions">Prescriptions</a>
        <a href="/admin/customers">Customers</a>
        <a href="/admin/users">Customer Care</a>
        <a href="/admin/create-user">Add Agent</a>
        <a href="/admin/settings">Settings</a>
        <a href="/admin/export-orders">Export CSV</a>
        <a href="/logout">Logout</a>
    </div>
    <div class="main-content">
        {% block admin_content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
