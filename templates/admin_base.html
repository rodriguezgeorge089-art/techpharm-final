<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Admin – {{ pharmacy_name }}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --deep-blue: #0A3D62; --gold: #F4A261; }
        body {
            font-family: 'Inter', sans-serif;
            background: #F1F5F9;
            margin: 0;
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #0A3D62, #0F4C7A);
            color: white;
            padding: 2rem 1.5rem;
            display: flex;
            flex-direction: column;
            position: fixed;
            top: 0; bottom: 0; left: 0;
            z-index: 1000;
        }
        .sidebar .brand {
            font-weight: 800; font-size: 1.8rem;
            margin-bottom: 2rem;
        }
        .sidebar .brand i { background: var(--gold); color: white; border-radius: 12px; padding: 8px 12px; margin-right: 10px; }
        .sidebar nav a {
            display: block;
            color: rgba(255,255,255,0.85);
            text-decoration: none;
            padding: 0.6rem 0;
            border-radius: 8px;
            margin-bottom: 0.3rem;
            font-weight: 500;
        }
        .sidebar nav a:hover { background: #0F4C7A; }
        .sidebar nav a.active { background: var(--gold); color: #0A3D62; font-weight: 700; }
        .main-content {
            margin-left: 260px;
            flex: 1;
            padding: 2rem;
            background: #F1F5F9;
            min-height: 100vh;
        }
        .top-bar {
            background: white;
            border-radius: 16px;
            padding: 1rem 1.5rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.04);
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>
    <aside class="sidebar">
        <div class="brand">
            <i class="fas fa-pills"></i> <span>DawaLink</span>
        </div>
        <nav>
            <a href="/admin"><i class="fas fa-tachometer-alt"></i> <span>Dashboard</span></a>
            <a href="/admin/orders"><i class="fas fa-shopping-cart"></i> <span>Orders</span></a>
            <a href="/admin/products"><i class="fas fa-pills"></i> <span>Products</span></a>
            <a href="/admin/prescriptions"><i class="fas fa-file-prescription"></i> <span>Prescriptions</span></a>
            <a href="/admin/customers"><i class="fas fa-users"></i> <span>Customers</span></a>
            <a href="/admin/users"><i class="fas fa-headset"></i> <span>Customer Care</span></a>
            <a href="/admin/create-user"><i class="fas fa-user-plus"></i> <span>Add Agent</span></a>
            <a href="/admin/settings"><i class="fas fa-cog"></i> <span>Settings</span></a>
            <a href="/admin/export-orders"><i class="fas fa-download"></i> <span>Export CSV</span></a>
        </nav>
        <div class="mt-auto">
            <span>{{ session.user_name or 'Admin' }}</span>
            <a href="/logout" class="btn btn-sm btn-outline-light ms-2">Logout</a>
        </div>
    </aside>

    <div class="main-content">
        <div class="top-bar">
            <h4 class="fw-bold" style="color: var(--deep-blue);">{% block page_title %}Dashboard{% endblock %}</h4>
            <button class="btn btn-outline-secondary rounded-pill" onclick="window.history.back()"><i class="fas fa-arrow-left"></i> Back</button>
        </div>
        {% block admin_content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
