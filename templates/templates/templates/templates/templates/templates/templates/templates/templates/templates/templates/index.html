{% extends "base.html" %}
{% block content %}
<h1>Products</h1>
{% for p in products %}
<div style="border:1px solid #ccc; margin:10px; padding:10px;">
    <h3>{{ p.name }}</h3>
    <p>OKES {{ p.price }}</p>
    <form action="/cart/add" method="POST" style="display:inline;">
        <input type="hidden" name="productId" value="{{ p.id }}">
        <button>Add to Cart</button>
    </form>
    {% if user %}
    <form action="/wishlist/toggle" method="POST" style="display:inline;">
        <input type="hidden" name="productId" value="{{ p.id }}">
        <button>Wishlist</button>
    </form>
    {% endif %}
    <a href="/compare/toggle/{{ p.id }}">Compare</a>
</div>
{% endfor %}
{% endblock %}
