<!DOCTYPE html>
<html>
<head><title>Products – Admin</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"></head>
<body>
<nav class="navbar navbar-dark bg-primary"><div class="container"><a class="navbar-brand" href="/admin">Admin</a><a class="btn btn-light" href="/logout">Logout</a></div></nav>
<div class="container-fluid"><div class="row">
<div class="col-md-2 bg-dark text-white p-3 vh-100">
    <h5>Admin Panel</h5>
    <a href="/admin">Dashboard</a><br>
    <a href="/admin/orders">Orders</a><br>
    <a href="/admin/products">Products</a><br>
    <a href="/admin/prescriptions">Prescriptions</a><br>
    <a href="/admin/customers">Customers</a><br>
    <a href="/admin/settings">Settings</a><br>
    <a href="/admin/export-orders">Export CSV</a><br>
    <a href="/">View Site</a>
</div>
<div class="col-md-10 p-4">
    <h2>Products</h2>
    <a href="/admin/add-product" class="btn btn-success mb-3">+ Add Product</a>
    <table class="table">
        <thead><tr><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Action</th></tr></thead>
        <tbody>
        {% for p in products %}
        <tr>
            <td>{{ p.name }}</td>
            <td>{{ p.category }}</td>
            <td>KSh {{ p.price }}</td>
            <td>{{ p.stock }}</td>
            <td>
                <a href="/admin/edit-product/{{ p.id }}" class="btn btn-sm btn-warning">Edit</a>
                <a href="/admin/delete-product/{{ p.id }}" class="btn btn-sm btn-danger" onclick="return confirm('Delete this product?')">Delete</a>
            </td>
        </tr>
        {% endfor %}
        </tbody>
    </table>
</div></div></div>
</body>
</html>
