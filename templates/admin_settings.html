{% extends "admin_base.html" %}
{% block title %}Settings{% endblock %}
{% block page_title %}Settings{% endblock %}
{% block admin_content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm rounded-4 p-4">
            <h5 class="fw-bold mb-4">Change Password</h5>
            <form method="post">
                <div class="mb-3"><input class="form-control" type="password" name="new_password" placeholder="New Password" required></div>
                <button type="submit" class="btn btn-primary w-100 rounded-pill">Update Password</button>
            </form>
            {% if request.args.get('success') %}<div class="alert alert-success mt-3 rounded-pill text-center"><i class="fas fa-check-circle me-2"></i> Password updated!</div>{% endif %}
        </div>
    </div>
</div>
{% endblock %}
