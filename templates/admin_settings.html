{% extends "admin_base.html" %}
{% block title %}Settings – {{ pharmacy_name }}{% endblock %}
{% block admin_content %}

<div class="top-bar">
    <h4 class="fw-bold mb-0" style="color: var(--deep-blue);"><i class="fas fa-cog me-2"></i>Settings</h4>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm rounded-4 p-4">
            <h5 class="fw-bold mb-4">Change Admin Password</h5>
            <form method="post">
                <div class="mb-3">
                    <label class="form-label fw-semibold">New Password</label>
                    <div class="input-group">
                        <input type="password" name="new_password" id="adminNewPassword" class="form-control" placeholder="Enter new password" required>
                        <button class="btn btn-outline-secondary toggle-password" type="button" data-target="adminNewPassword">
                            <i class="far fa-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary w-100 rounded-pill">Update Password</button>
            </form>
            {% if request.args.get('success') %}
            <div class="alert alert-success mt-3 rounded-pill text-center">
                <i class="fas fa-check-circle me-2"></i> Password updated successfully!
            </div>
            {% endif %}
        </div>
    </div>
</div>

{% endblock %}
