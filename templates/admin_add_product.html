{% extends "admin_base.html" %}
{% block title %}Add Product{% endblock %}
{% block page_title %}Add Product{% endblock %}
{% block topbar_right %}<a href="/admin/products" class="btn btn-outline-secondary rounded-pill"><i class="fas fa-arrow-left me-2"></i> Back to Products</a>{% endblock %}
{% block admin_content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card border-0 shadow-sm rounded-4 p-4">
            <form method="post" enctype="multipart/form-data">
                <div class="mb-3"><label class="form-label fw-semibold">Product Name</label><input type="text" name="name" class="form-control" placeholder="e.g., Paracetamol" required></div>
                <div class="mb-3"><label class="form-label fw-semibold">Description</label><textarea name="description" class="form-control" rows="3" placeholder="Brief description"></textarea></div>
                <div class="mb-3"><label class="form-label fw-semibold">Category</label><input type="text" name="category" class="form-control" placeholder="e.g., Supplements" required></div>
                <div class="row">
                    <div class="col-md-6 mb-3"><label class="form-label fw-semibold">Price (KSh)</label><input type="number" step="0.01" name="price" class="form-control" required></div>
                    <div class="col-md-6 mb-3"><label class="form-label fw-semibold">Stock</label><input type="number" name="stock" class="form-control" required></div>
                </div>
                <div class="mb-3"><label class="form-label fw-semibold">Product Image</label><input type="file" name="image" class="form-control" accept="image/*"></div>
                <button type="submit" class="btn btn-primary w-100 rounded-pill">Add Product</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
