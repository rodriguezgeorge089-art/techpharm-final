{% extends "admin_base.html" %}
{% block title %}Add Product{% endblock %}
{% block page_title %}Add Product{% endblock %}
{% block admin_content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-0 shadow-sm rounded-4 p-4">
            <form method="post" enctype="multipart/form-data">
                <div class="mb-3"><input class="form-control" name="name" placeholder="Product Name" required></div>
                <div class="mb-3"><textarea class="form-control" name="description" placeholder="Description"></textarea></div>
                <div class="mb-3"><input class="form-control" name="category" placeholder="Category" required></div>
                <div class="row mb-3">
                    <div class="col"><input class="form-control" type="number" step="0.01" name="price" placeholder="Price" required></div>
                    <div class="col"><input class="form-control" type="number" name="stock" placeholder="Stock" required></div>
                </div>
                <div class="mb-3"><input class="form-control" type="file" name="image" accept="image/*"></div>
                <button type="submit" class="btn btn-primary w-100 rounded-pill">Add Product</button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
