<!DOCTYPE html>
<html>
<body>
    <h1>Thank You! Your order has been placed.</h1>
    <p>Order ID: #{{ order.id }}</p>
    <p>Total: OKES {{ order.total_amount }}</p>
    <p>Status: {{ order.order_status }}</p>
    <ul>
    {% for i in items %}
        <li>{{ i.product_name }} × {{ i.quantity }} = OKES {{ i.total_price }}</li>
    {% endfor %}
    </ul>
    <a href="/">Continue Shopping</a>
</body>
</html>
